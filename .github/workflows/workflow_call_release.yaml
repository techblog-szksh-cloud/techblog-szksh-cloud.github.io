name: Release (workflow_call)
on:
  workflow_call:
    inputs:
      is_release:
        type: boolean
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
        with:
          aqua_version: v2.62.1
      - run: npm ci
      - run: npm run build
      - run: echo "techblog.szksh.cloud" > build/CNAME
      - if: inputs.is_release
        uses: suzuki-shunsuke/gh-pages-action@ce95bfca768d3d1a0454f8efb6f81a557a18bc68 # v0.1.0
        with:
          publish_dir: build
          destination_dir: docs
